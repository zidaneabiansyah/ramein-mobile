<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD966;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4A460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52BE80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E59CE6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for logo -->
  <circle cx="256" cy="256" r="250" fill="#FFFFFF" stroke="#0F1B7F" stroke-width="8"/>
  
  <!-- Exclamation marks - yellow -->
  <g>
    <!-- Left -->
    <rect x="135" y="25" width="20" height="80" rx="10" fill="#FFD966" transform="rotate(-25 145 65)"/>
    <!-- Center -->
    <rect x="246" y="10" width="20" height="90" rx="10" fill="#FFD966"/>
    <!-- Right -->
    <rect x="347" y="25" width="20" height="80" rx="10" fill="#FFD966" transform="rotate(25 357 65)"/>
  </g>
  
  <!-- Top hand - Yellow -->
  <g>
    <!-- Arm -->
    <path d="M 180 140 Q 180 180 200 220" stroke="#0F1B7F" stroke-width="45" fill="none" stroke-linecap="round"/>
    <path d="M 180 140 Q 180 180 200 220" stroke="url(#grad1)" stroke-width="35" fill="none" stroke-linecap="round"/>
    
    <!-- Fingers area -->
    <ellipse cx="200" cy="220" rx="35" ry="40" fill="url(#grad1)"/>
    
    <!-- Right arm -->
    <path d="M 332 140 Q 332 180 312 220" stroke="#0F1B7F" stroke-width="45" fill="none" stroke-linecap="round"/>
    <path d="M 332 140 Q 332 180 312 220" stroke="url(#grad1)" stroke-width="35" fill="none" stroke-linecap="round"/>
    
    <!-- Fingers area -->
    <ellipse cx="312" cy="220" rx="35" ry="40" fill="url(#grad1)"/>
    
    <!-- Center circle -->
    <circle cx="256" cy="200" r="45" fill="#E07856" stroke="#0F1B7F" stroke-width="8"/>
    <circle cx="256" cy="200" r="35" fill="#F5A995"/>
  </g>
  
  <!-- Left hand - Blue/Teal -->
  <g>
    <!-- Arm -->
    <path d="M 80 270 Q 100 300 130 340" stroke="#0F1B7F" stroke-width="50" fill="none" stroke-linecap="round"/>
    <path d="M 80 270 Q 100 300 130 340" stroke="url(#grad2)" stroke-width="38" fill="none" stroke-linecap="round"/>
    
    <!-- Fingers area -->
    <ellipse cx="130" cy="340" rx="40" ry="50" fill="url(#grad2)"/>
    
    <!-- Curved shape -->
    <path d="M 120 320 Q 100 350 110 400 L 160 400 Q 155 350 145 320" fill="url(#grad2)" stroke="#0F1B7F" stroke-width="6"/>
    
    <!-- Circle -->
    <circle cx="100" cy="280" r="48" fill="#E07856" stroke="#0F1B7F" stroke-width="8"/>
    <circle cx="100" cy="280" r="36" fill="#F5A995"/>
  </g>
  
  <!-- Right hand - Purple -->
  <g>
    <!-- Arm -->
    <path d="M 432 270 Q 412 300 382 340" stroke="#0F1B7F" stroke-width="50" fill="none" stroke-linecap="round"/>
    <path d="M 432 270 Q 412 300 382 340" stroke="url(#grad3)" stroke-width="38" fill="none" stroke-linecap="round"/>
    
    <!-- Fingers area -->
    <ellipse cx="382" cy="340" rx="40" ry="50" fill="url(#grad3)"/>
    
    <!-- Curved shape -->
    <path d="M 392 320 Q 412 350 402 400 L 352 400 Q 357 350 367 320" fill="url(#grad3)" stroke="#0F1B7F" stroke-width="6"/>
    
    <!-- Circle -->
    <circle cx="412" cy="280" r="48" fill="#E07856" stroke="#0F1B7F" stroke-width="8"/>
    <circle cx="412" cy="280" r="36" fill="#F5A995"/>
  </g>
</svg>